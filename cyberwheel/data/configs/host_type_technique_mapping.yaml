# Host Type to Technique Mapping Configuration
# Maps server types to allowed MITRE techniques per kill chain phase
# 
# This enables server-type-specific attack constraints:
# - WEB_SERVER: web-specific discovery, lateral movement, and impact
# - MAIL_SERVER: mail/exchange-specific techniques
# - FILE_SERVER: SMB/file-share-specific techniques
# - PROXY_SERVER: network interception and proxy-specific techniques
# - SSH_JUMP_SERVER: SSH-specific techniques
#
# Phases: discovery, lateral_movement, privilege_escalation, impact

WEB_SERVER:
  discovery:
    - T1087.002  # Gather Victim Identity - Domain Account
    # - T1046      # Network Service Discovery - Portscan
    - T1083      # File and Directory Discovery
    - T1217      # Browser History
    - T1049      # System Network Connections Discovery
    - T1016      # System Network Configuration Discovery
    - T1082      # System Information Discovery
    - T1057      # Process Discovery
    # - T1018      # Remote System Discovery - PingSweep
  lateral-movement:
    - T1021.003  # Remote Services: RDP
    - T1570      # Lateral Tool Transfer
    - T1550.002  # Use Alternate Authentication Material: Pass the Hash
    - T1550.003  # Use Alternate Authentication Material: Pass the Ticket
    - T1091      # Replication Through Removable Media
    # - T1563.002 # ----
  privilege-escalation:
    - T1546.008  # Event Triggered Execution: Accessibility Features
    - T1546.009  # Event Triggered Execution: AppInit DLLs
    - T1546.010  # Event Triggered Execution: Application Shimming
    - T1546.011  # Event Triggered Execution: Application Shimming
    - T1055.004  # Process Injection: Asynchronous Procedure Call
    - T1053.002  # Scheduled Task/Job: At (Windows)
    - T1547.002  # Boot or Logon Autostart Execution: Registry Run Keys
    - T1548.002  # Abuse Elevation Control Mechanism: Bypass User Account Control
    - T1574.012  # Hijack Execution Flow: COR_PROFILER
    - T1546.001  # Event Triggered Execution: Change Default File Association
    - T1055.001  # Process Injection: Dynamic-link Library Injection
    - T1574.001  # Hijack Execution Flow: DLL Search Order Hijacking
    - T1574.002  # Hijack Execution Flow: DLL Side-Loading
    - T1055.011  # Process Injection: Extra Window Memory Injection
    - T1546.012  # Event Triggered Execution: Image File Execution Options Injection
  impact:
    - T1486      # Data Encrypted for Impact
    - T1490      # Inhibit System Recovery
    - T1491.001  # Defacement: Internal Defacement
    - T1489      # Service Stop

