# Training Parameters
experiment_name: # qlearningRLRedAgentvsRLBlueAgent #TrainRedAgent_TwoLRs_AnnealonUpdate_BothHigh_ActionMask #EmulatorIntegrationCampaign_FixedTypeObs
deterministic: true # Whether or not the training is deterministic
seed: 1001
device: cpu # Which device to train on
async_env: false # Whether to run the environments in parallel
total_timesteps: 50000000 # Total number of steps to run throughout training
num_saves: 10 # Number of times the model is evaluated and saved during the training run
num_envs: 1 # Number of game environments to run at once (parallel if async_env == true)
num_steps: 50 # Number of steps to run per episode
eval_episodes: 10 # Number of episodes to run in an evaluation
debug_mode: false
epsilon: 0.2
decay_epsilon: false
decay_rate: 0.001
alpha: 0.1
drive: false
nrec: true
eval: false

num_hosts: 6
num_subnets: 2

# Environment Parameters
environment: CyberwheelRL # Environment class to use
network_config: # List of network configuration filenames in config/network, if none: generate randomly
  #  - 6-host-network.yaml 
  #  - 15-host-network.yaml 
  # - 25-host-network.yaml
  # - 50-host-network.yaml
host_config: host_defs_services.yaml # Host configuration filename in config/host_definitions
decoy_config: decoy_hosts.yaml # Decoy configuration filename in config/detector

agents:
  blue: inactive_blue_agent.yaml
  # blue: rl_blue_agent.yaml
  # red: rl_red_campaign.yaml
  # red: rl_red_agent.yaml
  red: rl_red_agent.yaml
  # red: rl_red_agent.yaml

policy_type: qlearning
method: copy_values # copy_values, softmax, kl_divergence, copy_params, increase_depth
expand_teacher_probs: false
kl_divergence_steps: 1000
reuse_model: false

use_target: true

valid_targets: servers
reward_function: RLReward # The reward function
blue_reward_function: reward_red_delay
red_reward_function: reward_decoy_hits
detector_config: perfect_detector.yaml # Detector configuration filename in config/detector
network_size_compatibility: small
max_decoys: 5

# RL Parameters
env_id: cyberwheel # Environment ID
learning_rate: 0.01 # Learning rate value of the optimizer
actor_lr: 2.5e-4
critic_lr: 2.5e-4
anneal_lr: cosine_restarts # Whether or not to anneal the learning rate for policy and value networks
min_lr: 1e-5 # floor LR for both
restart_Tmult: 1 # next cycle = 200k, then 400k, …
gamma: 0.995 # The discount factor (gamma value)
gae_lambda: 0.95 # Lambda for the general advantage estimation
num_minibatches: 4 # Number of minibatches
update_epochs: 4 # Number of epochs to update the policy
norm_adv: true # Whether or not to normalize advantages
clip_coef: 0.3 # Surrogate clipping coefficient
clip_vloss: true # Whether to use clipped loss for the value function
ent_coef: 0.02 # Coefficient of entropy
vf_coef: 0.5 # Coefficient of the value function
max_grad_norm: 0.5 # The maximum norm for the gradient clipping
target_kl: null # The target KL Divergence Threshold

# Weights & Biases Parameters (optional)
track: false
wandb_project_name: # The W&B project name if tracking
wandb_entity: # The W&B entity if tracking

load: false